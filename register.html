<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="assets/css/register.css">
    <title>Register</title>
</head>

<body>
    <header class="">

        <div class="top-bar">
            <div class="container">
                <div class="contact-info">
                    <a><i class="fa-solid fa-phone"></i> +012 345 6789</a>
                    <span class="separator">|</span>
                    <a><i class="fa-solid fa-envelope"></i> info@example.com</a>
                </div>
                <div class="social-links">
                    <a href="https://facebook.com" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="https://x.com" target="_blank"><i class="fa-brands fa-twitter"></i></a>
                    <a href="https://linkedin.com" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
                    <a href="https://instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://youtube.com" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>
        </div>

        <nav class="main-nav">
            <div class="container">
                <div class="logo">
                    <i class="fa-solid fa-house-medical"></i>
                    <span class="logospan">MEDCORE</span>
                </div>

                <div class="nav-wrapper">
                    <ul class="nav-links">
                        <li><a href="index.html" class="nav-a home-link">Home</a></li>
                        <li><a href="./about.html" class="nav-a has-underline">About</a></li>
                        <li><a href="./service.html" class="nav-a has-underline">Service</a></li>
                        <li><a href="./pricing.html" class="nav-a has-underline">Pricing</a></li>
                        <li><a href="#" class="nav-a has-underline">Pages <i class="fa-solid fa-caret-down"></i></a>
                        </li>
                        <li><a href="./contact.html" class="nav-a has-underline">Contact</a></li>
                        <li class="auth-buttons">
                            <a href="login.html" class="login-btn ">Login</a>
                            <a href="register.html" class="register-btn active">Register</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>


    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-overlay">
                <div class="overlay-panel">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <a href="login.html" class="ghost-btn">SIGN IN</a>
                </div>
            </div>

            <div class="auth-form-container">
                <form action="#">
                    <h1>Create Account</h1>
                    <div class="social-container">
                        <a href="facebook.com"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#"><i class="fa-brands fa-google"></i></a>
                        <a href="linkedin.com"><i class="fa-brands fa-linkedin-in"></i></a>
                    </div>
                    <span>or use your email for registration:</span>

                    <div class="auth-input-group">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" placeholder="Name" />
                    </div>
                    <div class="auth-input-group">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" placeholder="Email" />
                    </div>
                    <div class="auth-input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Password" />
                    </div>

                    <button type="submit" class="auth-main-btn">SIGN UP</button>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
